{% extends 'base.html' %}

{% block title %}Tizimga kirish{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 80px auto; padding: 35px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    
    <h2 style="text-align: center; color: #333; margin-bottom: 25px; font-weight: 600;">Tizimga kirish</h2>

    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        {% csrf_token %}
        
        <div class="form-group" style="color: #444; line-height: 1.6;">
            {{ form.as_p }}
        </div>
        
        <button type="submit" style="width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s ease-in-out; box-shadow: 0 2px 5px rgba(40,167,69,0.3); margin-top: 10px;">
            Kirish
        </button>
    </form>

    <div style="margin-top: 25px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="color: #666; font-size: 14px; margin: 0;">
            Hali ro'yxatdan o'tmadingizmi? 
            <a href="{% url 'register' %}" style="color: #007bff; text-decoration: none; font-weight: 600; margin-left: 5px;">Yangi hisob yaratish</a>
        </p>
    </div>
</div>
{% endblock %}
